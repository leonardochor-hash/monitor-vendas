name: Monitor Vendas Cartao

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"
    - cron: "0 20 * * *"
    - cron: "0 21 * * *"
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"
    - cron: "0 0 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      hora_simulada:
        description: "Hora simulada (ex: 20) - deixar vazio para hora real"
        required: false
        default: ""
      data_simulada:
        description: "Data simulada (ex: 13/05/2026) - deixar vazio para data real"
        required: false
        default: ""

jobs:
  monitorar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 pytz

      - name: Executar monitoramento
        run: python monitor_vendas.py
        env:
          CALLMEBOT_KEY: ${{ secrets.CALLMEBOT_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_REMETENTE: cap00leonardo@gmail.com
          EMAIL_DESTINATARIO: leonardochor@gmail.com
          HORA_SIMULADA: ${{ github.event.inputs.hora_simulada }}
          DATA_SIMULADA: ${{ github.event.inputs.data_simulada }}
